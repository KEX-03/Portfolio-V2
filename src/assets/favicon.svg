<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fdf7e9"/>
      <stop offset="100%" stop-color="#ede5d1"/>
    </radialGradient>
    <radialGradient id="dotGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9b7de8"/>
      <stop offset="100%" stop-color="#6b52c8"/>
    </radialGradient>
  </defs>

  <!-- Clean rounded background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- "vs" text vertically centered -->
  <text
    x="2"
    y="32"
    font-family="'Caveat', 'Comic Sans MS', cursive"
    font-size="34"
    font-style="italic"
    font-weight="400"
    fill="#231d11"
    letter-spacing="-0.5"
    dominant-baseline="central"
  >VS</text>

  <!-- Purple dot — vertically centered, close to text -->
  <circle cx="56" cy="32" r="4.5" fill="url(#dotGrad)"/>
  <circle cx="49.6" cy="30.6" r="1.4" fill="rgba(255,255,255,0.42)"/>
</svg>